name: CI

# Reproducible proof that the backend suite, quality gates, and E2E
# flows actually pass — not just claimed in a chat transcript
# (docs/gap_audit_report.md P1). Every job spins up its own ephemeral
# Postgres service container and applies schema.sql fresh; nothing
# here talks to a real exchange, a real LLM, or any external network
# service — matching this project's established "no mocks for
# anything DB-adjacent, but no real external network in the standard
# suite either" testing discipline. The `testnet`-marked Binance
# integration suite requires real credentials this CI has no business
# holding and is skipped here exactly like it is locally.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql+psycopg2://trading:trading_dev_password@localhost:5432/trading_platform

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: trading
          POSTGRES_PASSWORD: trading_dev_password
          POSTGRES_DB: trading_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trading -d trading_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Apply schema.sql
        run: psql "$DATABASE_URL_PSQL" -v ON_ERROR_STOP=1 -f schema.sql
        env:
          DATABASE_URL_PSQL: postgresql://trading:trading_dev_password@localhost:5432/trading_platform

      - name: black --check
        run: python -m black --check .

      - name: ruff check
        run: python -m ruff check .

      - name: mypy
        run: python -m mypy core/ strategies/ api/

      - name: pytest
        run: python -m pytest -v

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check + build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend-build]
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: trading
          POSTGRES_PASSWORD: trading_dev_password
          POSTGRES_DB: trading_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trading -d trading_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Apply schema.sql
        run: psql "$DATABASE_URL_PSQL" -v ON_ERROR_STOP=1 -f schema.sql
        env:
          DATABASE_URL_PSQL: postgresql://trading:trading_dev_password@localhost:5432/trading_platform

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Generate operator password hash
        id: operator
        run: |
          HASH=$(python -c "import bcrypt; print(bcrypt.hashpw(b'dev-password-123', bcrypt.gensalt()).decode())")
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Start backend
        run: |
          nohup python -m uvicorn api.main:app --host 127.0.0.1 --port 8000 > backend.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/api/health && break
            sleep 1
          done
        env:
          DASHBOARD_OPERATOR_USERNAME: devops
          DASHBOARD_OPERATOR_PASSWORD_HASH: ${{ steps.operator.outputs.hash }}
          DASHBOARD_ACCOUNT_ID: default

      - name: Start frontend dev server
        working-directory: frontend
        run: |
          nohup npm run dev > vite.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:5173/ && break
            sleep 1
          done

      - name: Run Playwright E2E tests
        working-directory: frontend
        # Single worker — the control-surface tests (kill switch, arming)
        # share global backend state, and playwright.config.ts already
        # sets fullyParallel:false for within-file ordering, but only
        # --workers=1 also serializes ACROSS spec files, which is what
        # this shared-state backend actually needs.
        run: npx playwright test --workers=1

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/test-results
            backend.log
            frontend/vite.log
          retention-days: 7
